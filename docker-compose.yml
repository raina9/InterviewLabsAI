# =============================================================================
# Interview Lab — Local Development Infrastructure
# =============================================================================
# Services: PostgreSQL | Kafka (KRaft — no Zookeeper)
#
# Usage:
#   Start:        docker-compose up -d
#   Stop:         docker-compose down
#   Fresh state:  docker-compose down -v   (removes all named volumes)
#   Logs:         docker-compose logs -f [service]
#
# Production equivalents:
#   PostgreSQL → Supabase (hosted) | AWS equivalent: RDS PostgreSQL
#   Kafka      → Upstash Kafka (managed, serverless) | AWS equivalent: SQS
# =============================================================================

version: "3.9"

services:

  # ---------------------------------------------------------------------------
  # PostgreSQL — Local development database
  # Prod: Supabase (Transaction pooler URL recommended for Railway deploys)
  # AWS equivalent: RDSConnectionConfig → RDS PostgreSQL (plug-in ready)
  # ---------------------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    container_name: interviewlab-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-interviewlab}
      POSTGRES_USER: ${POSTGRES_USER:-interviewlab}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-interviewlab}
      # locale settings for consistent collation across local + Supabase
      POSTGRES_INITDB_ARGS: "--locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - interviewlab-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-interviewlab} -d ${POSTGRES_DB:-interviewlab}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s

  # ---------------------------------------------------------------------------
  # Kafka — KRaft mode (no Zookeeper dependency)
  # KRaft: built-in Raft consensus — Kafka 2.8+ feature, stable from 3.3+
  # V1: EventPublisher (in-process) is the default runtime mode.
  #     Kafka activates only when KAFKA_BOOTSTRAP_SERVERS points to a real broker.
  # V2 unpark trigger: multi-instance Railway deploy or async scoring demand.
  # Prod: Upstash Kafka (SASL/TLS — set KAFKA_SECURITY_PROTOCOL=SASL_SSL in .env)
  # AWS equivalent: SQSMessagePublisher → aws-sdk/sqs (plug-in ready)
  # ---------------------------------------------------------------------------
  kafka:
    image: apache/kafka:latest
    container_name: interviewlab-kafka
    restart: unless-stopped
    ports:
      - "${KAFKA_PORT:-9092}:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://:9092,CONTROLLER://:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      # Single-broker local setup — replication factor 1 is correct here
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
    volumes:
      - interviewlab-kafka-data:/var/lib/kafka/data

# =============================================================================
# Named Volumes — data persists across container restarts
# Run `docker-compose down -v` to wipe all local data for a clean slate
# =============================================================================
volumes:
  interviewlab-postgres-data:
    driver: local
  interviewlab-kafka-data:
    driver: local
